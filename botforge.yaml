fleet:
  server: openclaw
  ssh_host: ${OPENCLAW_SSH_HOST}
  ssh_user: root
  base_dir: /opt/botforge

bots:
  kristina:
    config: bots/kristina.yaml
    service: botforge-kristina
    port: 8087
  atlas:
    config: bots/atlas.yaml
    service: botforge-atlas
    port: 8086
  maia:
    config: bots/maia.yaml
    service: botforge-maia
    port: 3100
  harry:
    config: bots/harry.yaml
    service: botforge-harry
    port: 8082
  babushka:
    config: bots/babushka.yaml
    service: botforge-babushka
    port: 8085
  alfred:
    config: standalone/taskbot
    service: taskbot
    port: 8088
    dashboard_port: 8090
  chief-of-staff:
    config: bots/chief-of-staff.yaml
    service: botforge-chief-of-staff
    port: 8091
  trainer:
    config: bots/trainer.yaml
    service: botforge-trainer
    port: 8092
  cleancloud:
    config: bots/cleancloud.yaml
    service: botforge-cleancloud
    port: 8093
  test-echo:
    config: bots/test-echo.yaml
    port: 9001
  test-claude:
    config: bots/test-claude.yaml
    port: 9002
  test-full:
    config: bots/test-full.yaml
    port: 9003
