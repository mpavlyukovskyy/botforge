name: Deploy Taskbot (Alfred)
on:
  push:
    branches: [main]
    paths: ['standalone/taskbot/**']
  workflow_dispatch:
concurrency:
  group: deploy-taskbot
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: standalone/taskbot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npm run build
      - name: Deploy to /opt/taskbot
        run: |
          rm -rf /opt/taskbot/dist.bak
          cp -al /opt/taskbot/dist /opt/taskbot/dist.bak 2>/dev/null || true
          rsync -a --delete dist/ /opt/taskbot/dist/
          rsync -a package.json package-lock.json /opt/taskbot/
          cp src/db/schema.sql /opt/taskbot/src/db/schema.sql 2>/dev/null || true
          cd /opt/taskbot && npm install --production --silent
          systemctl restart taskbot
          sleep 5
          HEALTH=$(curl -sf http://localhost:8088/api/health || echo '{}')
          echo "Health: $HEALTH"
          if ! echo "$HEALTH" | grep -q '"status"'; then
            echo "FAILED — rolling back"
            rsync -a --delete /opt/taskbot/dist.bak/ /opt/taskbot/dist/
            systemctl restart taskbot
            exit 1
          fi
          rm -rf /opt/taskbot/dist.bak
          echo "Taskbot deployed successfully"

      - name: Summary
        if: always()
        run: |
          echo "## Taskbot Deploy" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "FAILED — auto-rolled back" >> $GITHUB_STEP_SUMMARY
          fi
