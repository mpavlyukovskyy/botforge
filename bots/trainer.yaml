name: Trainer
version: "2.0"
description: Daily-workout-only trainer — Whoop + Hevy + Sonnet → workout pushed to Hevy. No conversational brain.

platform:
  type: telegram
  token: ${TRAINER_BOT_TOKEN}
  chat_ids: ["${TRAINER_CHAT_ID}"]
  mode: polling
  # Reverted to local-bot-api 2026-05-23 — cloud-direct switch hit a sticky
  # cloud-side polling-slot conflict that wouldn't clear without a logOut +
  # 10-min lockout. Local works; duplicates still need root cause investigation.
  local_bot_api: http://localhost:8081

# Minimal brain config (required by schema) — but never invoked in practice because
# dm_mode: ignore drops free-text DMs before the brain. Slash commands and inline
# button callbacks dispatch BEFORE reception rules, so they continue to work.
brain:
  provider: claude
  model: claude-sonnet-4-6
  tools: []
  temperature: 0
  budget_usd_per_day: 1


  max_tokens: 1024

resilience:
  circuit_breaker:
    threshold: 5
    reset_timeout_ms: 30000
  retry:
    max_attempts: 3
    backoff: exponential
    transient_codes: [429, 502, 503]

schedule:
  daily_sync:
    cron: "0 5 * * *"
    timezone: America/New_York
  program_rollover:
    cron: "55 6 * * *"
    timezone: America/New_York
  morning_workout:
    cron: "0 12 * * *"
    timezone: America/New_York
  morning_workout_watchdog:
    cron: "15 12 * * *"
    timezone: America/New_York
  token_refresh:
    # Offset minutes (NOT */5): every other Whoop-touching cron fires on a
    # 0/5 boundary, and node-cron 3.0.3 silently mangles range-step syntax
    # like "2-57/5" into multiples of 5 — explicit list only.
    cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
    timezone: UTC
  conversation_cleanup:
    cron: "0 4 * * *"
    timezone: UTC
  whoop_recovery_refresh_midday:
    cron: "30 11 * * *"
    timezone: America/New_York
  whoop_recovery_refresh_evening:
    cron: "0 18 * * *"
    timezone: America/New_York
  winddown_prompt:
    cron: "30 23 * * *"
    timezone: America/New_York
  bedtime_prompt:
    cron: "0 1 * * *"
    timezone: America/New_York

health:
  port: 8092
  path: /api/health
  heartbeat:
    poll_url: https://botforge-kuma.fly.dev/api/push/b69df749ca45e564b6684a32861d6e7d?status=up&msg=OK&ping=
    poll_interval_ms: 60000

behavior:
  reception:
    dm_mode: ignore
    group_mode: ignore
    respond_to_replies: false
    respond_to_mentions: false
  response:
    typing_indicator: true
    markdown: true
    markdown_fallback: true
    max_message_length: 4000
  concurrency:
    chat_lock: true

env_file: ../.env

# T2.8 — workspace cap monitoring (cap_usd from ANTHROPIC_WORKSPACE_CAP_USD env)
workspace_monitor:
  enabled: true
