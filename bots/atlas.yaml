name: Atlas
version: "1.0"
description: Shared task tracker for Mark+Hendrik team, syncs to Spok board

platform:
  type: telegram
  token: ${TELEGRAM_BOT_TOKEN}
  chat_ids: ["${TELEGRAM_CHAT_ID}"]
  mode: polling

brain:
  provider: claude
  model: claude-opus-4-6
  system_prompt_file: prompts/atlas.md
  tools:
    - query_board
    - create_task
    - update_task
    - mark_done
    - delete_task
  temperature: 0
  max_tokens: 4096

memory:
  conversation_history:
    enabled: true
    ttl_days: 14
    max_messages: 100
  context_blocks:
    - type: board_state
      label: active_tasks
    - type: recent_history
      label: recent_conversation_history

resilience:
  circuit_breaker:
    threshold: 5
    reset_timeout_ms: 30000
  retry:
    max_attempts: 3
    backoff: exponential
    transient_codes: [429, 502, 503]

schedule:
  daily_digest:
    cron: "30 8 * * *"
    timezone: Australia/Sydney
  auto_archive:
    cron: "0 8 * * *"
    timezone: Australia/Sydney
  conversation_cleanup:
    cron: "0 4 * * *"
    timezone: UTC
  sync_retry:
    cron: "*/5 * * * *"
    timezone: UTC

integrations:
  spok:
    url: https://spok.vc
    sync_endpoint: /api/sync/agenda-bot/items
    token: ${SPOK_SYNC_KEY}
    fund_id: ${SPOK_DEFAULT_FUND_ID}
    read_fund_ids: ${SPOK_READ_FUND_IDS}

health:
  port: 8086
  path: /api/health

passive_detection:
  keywords: ["atlas"]
  case_sensitive: false

env_file: ../.env
